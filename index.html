<html lang="en">

<meta charset="UTF-8">

<title>Dinny Git Goat</title>

<style>
  :root {

    --surface: #111116;

    --border: #2a2a35;

    --accent-dim: #a8882a;
    --danger: #e84a4a;
    --text: #e8e8f0;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    width: 100%;
    max-width: 680px;
    padding: 48px 24px 16px;
    text-align: center;
  }

  .logo-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 12px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .divider {
    width: 100%;
    max-width: 680px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 24px auto;
  }

  main {
    width: 100%;
    max-width: 680px;
    padding: 0 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Mission Cards */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .card:hover {
    border-color: var(--accent-dim);
    box-shadow: 0 0 24px var(--card-glow), inset 0 0 24px var(--card-glow);
  }

  .card.special {
    border-color: var(--accent-dim);
    background: linear-gradient(135deg, #1a1a10 0%, var(--card-bg) 60%);
  }

  .card.special::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .card-inner {
    padding: 20px 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .card-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--text-muted);
    min-width: 32px;
    margin-top: 2px;
    transition: color 0.2s;
  }

  .card:hover .card-number {
    color: var(--accent-dim);
  }

  .card.special .card-number {
    color: var(--accent);
  }

  .card-content {
    flex: 1;
  }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
  }

  .card.special .card-tag {
    color: var(--accent-dim);
  }

  .card-mission {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text);
  }

  .card-mission strong {
    color: var(--accent);
    font-weight: 600;
  }

  /* Crossed out state */
  .card.completed {
    opacity: 0.4;
  }

  .card.completed .card-mission {
    text-decoration: line-through;
    text-decoration-color: var(--danger);
  }

  .card-x {
    position: absolute;
    top: 12px; right: 14px;
    width: 24px; height: 24px;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-muted);
    transition: all 0.15s;
    background: transparent;
    font-family: 'DM Mono', monospace;
  }

  .card-x:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(232, 74, 74, 0.08);
  }

  .card.completed .card-x {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(232, 74, 74, 0.12);
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 3px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }

  .btn-primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-ghost {
    border-color: var(--border);
    color: var(--text-dim);
  }

  .btn-ghost:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* Counter bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .status-bar .live {
    color: var(--accent);
  }

  .pips {
    display: flex;
    gap: 4px;
  }

  .pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }

  .pip.active {
    background: var(--accent);
  }

  .pip.done {
    background: var(--danger);
  }

  /* Got badge */
  .got-banner {
    display: none;
    text-align: center;
    padding: 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--danger);
    letter-spacing: 0.1em;
    animation: pulse 1s ease infinite alternate;
  }

  .got-banner.show { display: block; }

  @keyframes pulse {
    from { opacity: 0.6; }
    to { opacity: 1; }
  }

  footer {
    padding: 0 24px 40px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-align: center;
  }
</style>
</head>

const SPECIAL = `Get them to say <strong>"what"</strong> in response to: <em>"Guess what?"</em>`;

let completedSet = new Set();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function dealNew() {
  completedSet.clear();
  const picked = shuffle(MISSIONS).slice(0, 5);
  render(picked);
}

function toggleCard(idx) {
  if (completedSet.has(idx)) {
    completedSet.delete(idx);
  } else {
    completedSet.add(idx);
  }
  updateUI();
}

function resetCompleted() {
  completedSet.clear();
  updateUI();
}

function updateUI() {
  const cards = document.querySelectorAll('.card');
  const pips = document.querySelectorAll('.pip');
  let active = 0;

  cards.forEach((card, i) => {
    const done = completedSet.has(i);
    card.classList.toggle('completed', done);
    if (pips[i]) {
      pips[i].classList.toggle('done', done);
      pips[i].classList.toggle('active', !done);
    }
    if (!done) active++;
  });

  document.getElementById('activeCount').textContent = active;

  const banner = document.getElementById('gotBanner');
  banner.classList.toggle('show', active === 0);
}

function render(missions) {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';

  // Build pip row
  const pipsEl = document.getElementById('pips');
  pipsEl.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'pip active';
    pipsEl.appendChild(p);
  }

  // Special card (always card 0 / index 5 visually at bottom, but let's put it last)
  const allMissions = [...missions, null]; // null = special

  allMissions.forEach((mission, i) => {
    const isSpecial = mission === null;
    const card = document.createElement('div');
    card.className = 'card' + (isSpecial ? ' special' : '');
    card.dataset.idx = i;

    const xBtn = document.createElement('button');
    xBtn.className = 'card-x';
    xBtn.textContent = '✕';
    xBtn.title = 'Mark as used';
    xBtn.onclick = () => toggleCard(i);

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-number">${String(i + 1).padStart(2, '0')}</div>
        <div class="card-content">
          <span class="card-tag">${isSpecial ? '★ Always Active' : 'Mission'}</span>
          <div class="card-mission">${isSpecial ? SPECIAL : mission}</div>
        </div>
      </div>
    `;
    card.appendChild(xBtn);
    stack.appendChild(card);

    // Staggered entrance
    setTimeout(() => card.classList.add('visible'), 60 * i + 80);
  });

  document.getElementById('gotBanner').classList.remove('show');
  document.getElementById('activeCount').textContent = 6;
}

// Initial deal
dealNew();
